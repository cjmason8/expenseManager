# AWS Secrets Manager Configuration Example

aws.secrets.region=ap-southeast-2

# AWS Credentials (optional - if not provided, uses DefaultCredentialsProvider)
# This will use:
# 1. Environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
# 2. System properties (aws.accessKeyId, aws.secretAccessKey)
# 3. IAM role credentials for EC2/ECS/Lambda
# 4. AWS credentials file (~/.aws/credentials)
aws.secrets.access-key=
aws.secrets.secret-key=

# Session token for temporary credentials (optional)
aws.secrets.session-token=

# Email credentials secret name (contains USER_NAME and PASSWORD keys)
email.secret.name=email-credentials

# Environment (determines which database secret to use)
env=local
