# Root S3 key prefix (within aws.s3.bucket) for all documents, e.g. expenseManager or org/expenseManager
docs.location=${DOCS_LOCATION:expenseManager}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.main.allow-circular-references=true

management.endpoints.web.expose.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/

# S3 uploads. Set bucket and keys via env (e.g. AWS_S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) or override here.
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:ap-southeast-2}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
# Required only for temporary credentials (STS / assumed role)
aws.s3.session-token=${AWS_SESSION_TOKEN:}
# Optional: custom endpoint (e.g. LocalStack) and path-style URLs
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.s3.path-style-access=${AWS_S3_PATH_STYLE:false}

# AWS Secrets Manager
aws.secrets.enabled=true
aws.secrets.region=ap-southeast-2
email.secret.name=email-credentials
env=${ENV:local}
